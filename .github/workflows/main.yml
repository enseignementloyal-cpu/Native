name: Build APK — LOTATO PRO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Node dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup app icons
        run: |
          RES="android/app/src/main/res"
          mkdir -p "$RES/mipmap-mdpi"
          mkdir -p "$RES/mipmap-hdpi"
          mkdir -p "$RES/mipmap-xhdpi"
          mkdir -p "$RES/mipmap-xxhdpi"
          mkdir -p "$RES/mipmap-xxxhdpi"
          mkdir -p "$RES/mipmap-anydpi-v26"
          mkdir -p "$RES/drawable"

          cp www/icons/72.png  "$RES/mipmap-mdpi/ic_launcher.png"    2>/dev/null || true
          cp www/icons/72.png  "$RES/mipmap-hdpi/ic_launcher.png"    2>/dev/null || true
          cp www/icons/96.png  "$RES/mipmap-xhdpi/ic_launcher.png"   2>/dev/null || true
          cp www/icons/144.png "$RES/mipmap-xxhdpi/ic_launcher.png"  2>/dev/null || true
          cp www/icons/192.png "$RES/mipmap-xxxhdpi/ic_launcher.png" 2>/dev/null || true
          cp www/icons/512.png "$RES/drawable/ic_launcher_foreground.png" 2>/dev/null || true

          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "$RES/mipmap-${dir}/ic_launcher.png" \
               "$RES/mipmap-${dir}/ic_launcher_round.png" 2>/dev/null || true
          done

          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@drawable/ic_launcher_foreground"/>\n</adaptive-icon>\n' \
            > "$RES/mipmap-anydpi-v26/ic_launcher.xml"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@drawable/ic_launcher_foreground"/>\n</adaptive-icon>\n' \
            > "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

          mkdir -p "$RES/values"
          if grep -q "ic_launcher_background" "$RES/values/colors.xml" 2>/dev/null; then
            echo "couleur deja presente"
          else
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#0A0B1E</color>\n</resources>\n' \
              > "$RES/values/ic_launcher_colors.xml"
          fi
          echo "Icones configurees"

      - name: Inject ThermalPrinter plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/lotato/printer"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/com/lotato/printer/ThermalPrinterPlugin.java "$PLUGIN_DIR/"

      - name: Create Sunmi AIDL interfaces
        run: |
          AIDL_DIR="android/app/src/main/aidl/woyou/aidlservice/jiuiv5"
          mkdir -p "$AIDL_DIR"

          printf 'package woyou.aidlservice.jiuiv5;\nimport woyou.aidlservice.jiuiv5.ICallback;\nimport android.graphics.Bitmap;\ninterface IWoyouService {\nvoid printerInit(in ICallback callback);\nvoid printText(String text, in ICallback callback);\nvoid printBitmap(in Bitmap bitmap, in ICallback callback);\nvoid cutPaper(in ICallback callback);\nvoid lineWrap(int n, in ICallback callback);\nvoid setAlignment(int alignment, in ICallback callback);\nvoid setFontSize(float fontSize, in ICallback callback);\n}\n' \
            > "$AIDL_DIR/IWoyouService.aidl"

          printf 'package woyou.aidlservice.jiuiv5;\ninterface ICallback {\nvoid onRunResult(boolean isSuccess);\nvoid onReturnString(String result);\nvoid onRaiseException(int code, String msg);\n}\n' \
            > "$AIDL_DIR/ICallback.aidl"

          echo "AIDL Sunmi crees"

      - name: Download Sunmi SDK
        run: |
          LIBS_DIR="android/app/libs"
          mkdir -p "$LIBS_DIR"
          curl -fsSL \
            "https://github.com/sunmi-os/SunmiPrinterLibrary/raw/master/PrinterLibrary/sunmiprinter.aar" \
            -o "$LIBS_DIR/sunmiprinter.aar" \
            && echo "SDK Sunmi telecharge" \
            || echo "SDK Sunmi non disponible - fallback PrintManager"

      - name: Configure build.gradle
        run: |
          BG="android/app/build.gradle"
          ROOT_BG="android/build.gradle"

          grep -q "aidl true" "$BG" || \
            sed -i 's/android {/android {\n    buildFeatures { aidl true }/' "$BG"

          grep -q "fileTree.*libs" "$BG" || \
            sed -i 's/dependencies {/dependencies {\n    implementation fileTree(dir: "libs", include: ["*.aar", "*.jar"])/' "$BG"

          grep -q "jitpack" "$ROOT_BG" || \
            sed -i 's/repositories {/repositories {\n        maven { url "https:\/\/jitpack.io" }/' "$ROOT_BG"

          echo "build.gradle configure"

      - name: Register plugin in MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAIN" ]; then
            MAIN=$(find android -name "MainActivity.kt" | head -1)
          fi
          echo "MainActivity : $MAIN"

          if echo "$MAIN" | grep -q ".java"; then
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.lotato.printer.ThermalPrinterPlugin;/' "$MAIN"
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super\.onCreate/registerPlugin(ThermalPrinterPlugin.class);\n        super.onCreate/' "$MAIN"
          else
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity/import com.getcapacitor.BridgeActivity\nimport com.lotato.printer.ThermalPrinterPlugin/' "$MAIN"
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super\.onCreate/registerPlugin(ThermalPrinterPlugin::class.java)\n        super.onCreate/' "$MAIN"
          fi
          cat "$MAIN"

      - name: Add permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "BLUETOOTH_CONNECT" "$MANIFEST" || \
            sed -i 's/<uses-permission android:name="android.permission.INTERNET" \/>/\<uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" \/>/' \
            "$MANIFEST"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="LOTATO-PRO-v${{ github.run_number }}-${DATE}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LOTATO-PRO-v${{ github.run_number }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

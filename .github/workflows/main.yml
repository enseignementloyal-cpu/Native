name: Build APK — LOTATO PRO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Node dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # ════════════════════════════════════════════════════════
      # ICÔNES — copier dans tous les dossiers mipmap Android
      # ════════════════════════════════════════════════════════
      - name: Setup app icons
        run: |
          RES="android/app/src/main/res"

          # Créer tous les dossiers mipmap
          mkdir -p "$RES/mipmap-mdpi"
          mkdir -p "$RES/mipmap-hdpi"
          mkdir -p "$RES/mipmap-xhdpi"
          mkdir -p "$RES/mipmap-xxhdpi"
          mkdir -p "$RES/mipmap-xxxhdpi"
          mkdir -p "$RES/mipmap-anydpi-v26"
          mkdir -p "$RES/drawable"

          # Copier les icônes aux bonnes tailles
          cp www/icons/48.png  "$RES/mipmap-mdpi/ic_launcher.png"     2>/dev/null || \
          cp www/icons/72.png  "$RES/mipmap-mdpi/ic_launcher.png"     2>/dev/null || \
          cp www/72.png        "$RES/mipmap-mdpi/ic_launcher.png"      2>/dev/null || true

          cp www/icons/72.png  "$RES/mipmap-hdpi/ic_launcher.png"     2>/dev/null || \
          cp www/72.png        "$RES/mipmap-hdpi/ic_launcher.png"      2>/dev/null || true

          cp www/icons/96.png  "$RES/mipmap-xhdpi/ic_launcher.png"    2>/dev/null || \
          cp www/96.png        "$RES/mipmap-xhdpi/ic_launcher.png"     2>/dev/null || true

          cp www/icons/144.png "$RES/mipmap-xxhdpi/ic_launcher.png"   2>/dev/null || \
          cp www/144.png       "$RES/mipmap-xxhdpi/ic_launcher.png"    2>/dev/null || true

          cp www/icons/192.png "$RES/mipmap-xxxhdpi/ic_launcher.png"  2>/dev/null || \
          cp www/192.png       "$RES/mipmap-xxxhdpi/ic_launcher.png"   2>/dev/null || true

          # Copier aussi comme ic_launcher_round (icône ronde Android)
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "$RES/mipmap-${dir}/ic_launcher.png" \
               "$RES/mipmap-${dir}/ic_launcher_round.png" 2>/dev/null || true
          done

          # ic_launcher_foreground pour les adaptive icons
          cp www/icons/512.png "$RES/drawable/ic_launcher_foreground.png" 2>/dev/null || \
          cp www/512.png       "$RES/drawable/ic_launcher_foreground.png"  2>/dev/null || true

          # Adaptive icon XML (Android 8+)
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          cat > "$RES/mipmap-anydpi-v26/ic_launcher_round.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          # Couleur de fond de l'icône
          mkdir -p "$RES/values"
          if ! grep -q "ic_launcher_background" "$RES/values/colors.xml" 2>/dev/null; then
            cat >> "$RES/values/colors.xml" << 'XML' || \
            cat > "$RES/values/colors.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#0A0B1E</color>
          </resources>
          XML
          fi

          echo "✅ Icônes configurées"
          ls -la "$RES/mipmap-xxhdpi/"

      # ════════════════════════════════════════════════════════
      # IMPRESSION — Plugin ThermalPrinter complet
      # ════════════════════════════════════════════════════════
      - name: Inject ThermalPrinter plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/lotato/printer"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/com/lotato/printer/ThermalPrinterPlugin.java \
             "$PLUGIN_DIR/"
          echo "✅ Plugin copié"

      - name: Create Sunmi AIDL interfaces
        run: |
          AIDL_DIR="android/app/src/main/aidl/woyou/aidlservice/jiuiv5"
          mkdir -p "$AIDL_DIR"

          printf '%s\n' \
            'package woyou.aidlservice.jiuiv5;' \
            'import woyou.aidlservice.jiuiv5.ICallback;' \
            'import android.graphics.Bitmap;' \
            'interface IWoyouService {' \
            'void printerInit(in ICallback callback);' \
            'void printText(String text, in ICallback callback);' \
            'void printBitmap(in Bitmap bitmap, in ICallback callback);' \
            'void cutPaper(in ICallback callback);' \
            'void lineWrap(int n, in ICallback callback);' \
            'void setAlignment(int alignment, in ICallback callback);' \
            'void setFontSize(float fontSize, in ICallback callback);' \
            '}' > "$AIDL_DIR/IWoyouService.aidl"

          printf '%s\n' \
            'package woyou.aidlservice.jiuiv5;' \
            'interface ICallback {' \
            'void onRunResult(boolean isSuccess);' \
            'void onReturnString(String result);' \
            'void onRaiseException(int code, String msg);' \
            '}' > "$AIDL_DIR/ICallback.aidl"

          echo "✅ AIDL Sunmi créés"
          cat "$AIDL_DIR/IWoyouService.aidl"

      - name: Download Sunmi SDK AAR
        run: |
          LIBS_DIR="android/app/libs"
          mkdir -p "$LIBS_DIR"

          # Télécharger le SDK Sunmi officiel depuis GitHub
          echo "Téléchargement SDK Sunmi..."
          curl -fsSL \
            "https://github.com/sunmi-os/SunmiPrinterLibrary/raw/master/PrinterLibrary/sunmiprinter.aar" \
            -o "$LIBS_DIR/sunmiprinter.aar" && \
            echo "✅ SDK Sunmi téléchargé: $(ls -lh $LIBS_DIR/sunmiprinter.aar)" || \
            echo "⚠️ SDK Sunmi non disponible - impression via PrintManager uniquement"

      - name: Configure build.gradle (impression + icônes)
        run: |
          BG="android/app/build.gradle"

          # Activer AIDL
          grep -q "aidl true" "$BG" || \
            sed -i 's/android {/android {\n    buildFeatures { aidl true }/' "$BG"

          # Ajouter libs/ comme source de dépendances locales
          grep -q "fileTree.*libs" "$BG" || \
            sed -i 's/dependencies {/dependencies {\n    implementation fileTree(dir: "libs", include: ["*.aar", "*.jar"])/' "$BG"

          # Ajouter dépendance Sunmi depuis Maven (fallback si AAR absent)
          grep -q "sunmi" "$BG" || \
            sed -i 's/dependencies {/dependencies {\n    compileOnly "com.sunmi:printerlibrary:1.0.14"/' "$BG"

          # Ajouter dépôt Maven Sunmi dans android/build.gradle
          ROOT_BG="android/build.gradle"
          grep -q "jitpack\|sunmi" "$ROOT_BG" || \
            sed -i 's/repositories {/repositories {\n        maven { url "https:\/\/jitpack.io" }\n        maven { url "https:\/\/raw.githubusercontent.com\/sunmi-os\/SunmiPrinterLibrary\/master" }/' "$ROOT_BG"

          echo "✅ build.gradle configuré"
          echo "--- android/app/build.gradle (extrait) ---"
          grep -A3 "buildFeatures\|sunmi\|fileTree" "$BG" | head -20

      - name: Register plugin in MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAIN" ]; then
            MAIN=$(find android -name "MainActivity.kt" | head -1)
          fi
          echo "→ MainActivity : $MAIN"

          if echo "$MAIN" | grep -q ".java"; then
            # Java — ajouter import si absent
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.lotato.printer.ThermalPrinterPlugin;/' "$MAIN"
            # Ajouter registerPlugin avant super.onCreate
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super\.onCreate/registerPlugin(ThermalPrinterPlugin.class);\n        super.onCreate/' "$MAIN"
          else
            # Kotlin
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity/import com.getcapacitor.BridgeActivity\nimport com.lotato.printer.ThermalPrinterPlugin/' "$MAIN"
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super\.onCreate/registerPlugin(ThermalPrinterPlugin::class.java)\n        super.onCreate/' "$MAIN"
          fi

          echo "✅ MainActivity modifié :"
          cat "$MAIN"

      - name: Add Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "BLUETOOTH_CONNECT" "$MANIFEST" || sed -i \
            's/<uses-permission android:name="android.permission.INTERNET" \/>/\
          <uses-permission android:name="android.permission.INTERNET" \/>\
          <uses-permission android:name="android.permission.BLUETOOTH" \/>\
          <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" \/>\
          <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" \/>\
          <uses-permission android:name="android.permission.BLUETOOTH_SCAN" \/>\
          <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" \/>/' \
            "$MANIFEST"
          echo "✅ Permissions ajoutées"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="LOTATO-PRO-v${{ github.run_number }}-${DATE}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "✅ APK : $APK_NAME ($(du -sh $APK_NAME | cut -f1))"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LOTATO-PRO-v${{ github.run_number }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

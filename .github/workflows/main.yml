name: Build APK — LOTATO PRO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install Node dependencies
        run: npm ci

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject ThermalPrinter plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/lotato/printer"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/com/lotato/printer/ThermalPrinterPlugin.java \
             "$PLUGIN_DIR/"

      - name: Create Sunmi AIDL interface
        run: |
          AIDL_DIR="android/app/src/main/aidl/woyou/aidlservice/jiuiv5"
          mkdir -p "$AIDL_DIR"

          cat > "$AIDL_DIR/IWoyouService.aidl" << 'AIDL'
          package woyou.aidlservice.jiuiv5;
          import woyou.aidlservice.jiuiv5.ICallback;
          import android.graphics.Bitmap;
          interface IWoyouService {
              void printerInit(in ICallback callback);
              void printText(String text, in ICallback callback);
              void printBitmap(in Bitmap bitmap, in ICallback callback);
              void cutPaper(in ICallback callback);
              void lineWrap(int n, in ICallback callback);
          }
          AIDL

          cat > "$AIDL_DIR/ICallback.aidl" << 'AIDL'
          package woyou.aidlservice.jiuiv5;
          interface ICallback {
              void onRunResult(boolean isSuccess);
              void onReturnString(String result);
              void onRaiseException(int code, String msg);
          }
          AIDL

      - name: Configure android/app/build.gradle
        run: |
          BG="android/app/build.gradle"
          # Activer AIDL
          if ! grep -q "buildFeatures" "$BG"; then
            sed -i 's/android {/android {\n    buildFeatures { aidl true }/' "$BG"
          fi
          # Ajouter dépendance Sunmi
          if ! grep -q "sunmi" "$BG"; then
            sed -i 's/dependencies {/dependencies {\n    implementation "com.sunmi:printerlibrary:1.0.14"/' "$BG"
          fi

      - name: Register plugin in MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAIN" ]; then
            MAIN=$(find android -name "MainActivity.kt" | head -1)
            # Kotlin
            sed -i 's/import com.getcapacitor.BridgeActivity/import com.getcapacitor.BridgeActivity\nimport com.lotato.printer.ThermalPrinterPlugin/' "$MAIN"
            sed -i 's/class MainActivity : BridgeActivity()/class MainActivity : BridgeActivity() {\n    override fun onCreate(savedInstanceState: android.os.Bundle?) {\n        registerPlugin(ThermalPrinterPlugin::class.java)\n        super.onCreate(savedInstanceState)\n    }\n}/' "$MAIN"
          else
            # Java
            sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.lotato.printer.ThermalPrinterPlugin;/' "$MAIN"
            sed -i 's/public class MainActivity extends BridgeActivity {/public class MainActivity extends BridgeActivity {\n    @Override\n    public void onCreate(android.os.Bundle savedInstanceState) {\n        registerPlugin(ThermalPrinterPlugin.class);\n        super.onCreate(savedInstanceState);\n    }/' "$MAIN"
          fi

      - name: Add Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "$MANIFEST"
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="LOTATO-PRO-v${{ github.run_number }}-${DATE}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LOTATO-PRO-APK
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "LOTATO PRO v${{ github.run_number }}"
          body: |
            ## 📱 LOTATO PRO — APK Android

            **Build :** #${{ github.run_number }}
            **Commit :** ${{ github.sha }}

            ### ✅ Impression thermique supportée
            - Sunmi V2s / T2s / V1s / P2 / L2
            - Toute imprimante Android (WiFi, Bluetooth, USB)
            - Telpo, Urovo, Newland

            ### Installation
            1. Télécharger le `.apk` ci-dessous
            2. Sur Android : **Paramètres → Sécurité → Sources inconnues** ✓
            3. Ouvrir et installer
          files: ${{ env.APK_NAME }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

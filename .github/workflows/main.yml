name: Build APK — LOTATO PRO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Node dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Plugin ThermalPrinter ──────────────────────────────────
      - name: Inject ThermalPrinter plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/lotato/printer"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/com/lotato/printer/ThermalPrinterPlugin.java "$PLUGIN_DIR/"

      # ── AIDL Sunmi (sans indentation pour éviter erreurs) ──────
      - name: Create Sunmi AIDL
        run: |
          AIDL_DIR="android/app/src/main/aidl/woyou/aidlservice/jiuiv5"
          mkdir -p "$AIDL_DIR"

          printf 'package woyou.aidlservice.jiuiv5;\nimport woyou.aidlservice.jiuiv5.ICallback;\nimport android.graphics.Bitmap;\ninterface IWoyouService {\nvoid printerInit(in ICallback callback);\nvoid printText(String text, in ICallback callback);\nvoid printBitmap(in Bitmap bitmap, in ICallback callback);\nvoid cutPaper(in ICallback callback);\nvoid lineWrap(int n, in ICallback callback);\n}\n' > "$AIDL_DIR/IWoyouService.aidl"

          printf 'package woyou.aidlservice.jiuiv5;\ninterface ICallback {\nvoid onRunResult(boolean isSuccess);\nvoid onReturnString(String result);\nvoid onRaiseException(int code, String msg);\n}\n' > "$AIDL_DIR/ICallback.aidl"

      # ── Ajouter dépôt Sunmi + dépendance dans build.gradle ─────
      - name: Configure build.gradle
        run: |
          BG="android/app/build.gradle"

          # Activer AIDL
          grep -q "buildFeatures" "$BG" || \
            sed -i 's/android {/android {\n    buildFeatures { aidl true }/' "$BG"

          # Dépendance Sunmi
          grep -q "sunmi" "$BG" || \
            sed -i 's/dependencies {/dependencies {\n    implementation "com.sunmi:printerlibrary:1.0.14"/' "$BG"

          # Ajouter dépôt Maven Sunmi dans build.gradle du projet
          ROOT_BG="android/build.gradle"
          grep -q "sunmi-os" "$ROOT_BG" || \
            sed -i 's/repositories {/repositories {\n        maven { url "https:\/\/raw.githubusercontent.com\/sunmi-os\/SunmiPrinterLibrary\/master" }/' "$ROOT_BG"

      # ── Enregistrer plugin dans MainActivity ───────────────────
      - name: Register ThermalPrinter in MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          if [ -n "$MAIN" ]; then
            echo "→ Trouvé MainActivity.java : $MAIN"
            # Ajouter import seulement si pas déjà là
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.lotato.printer.ThermalPrinterPlugin;/' "$MAIN"
            # Ajouter registerPlugin seulement si pas déjà là
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super.onCreate/registerPlugin(ThermalPrinterPlugin.class);\n        super.onCreate/' "$MAIN"
          else
            MAIN=$(find android -name "MainActivity.kt" | head -1)
            echo "→ Trouvé MainActivity.kt : $MAIN"
            grep -q "ThermalPrinterPlugin" "$MAIN" || \
              sed -i 's/import com.getcapacitor.BridgeActivity/import com.getcapacitor.BridgeActivity\nimport com.lotato.printer.ThermalPrinterPlugin/' "$MAIN"
            grep -q "registerPlugin" "$MAIN" || \
              sed -i 's/super.onCreate/registerPlugin(ThermalPrinterPlugin::class.java)\n        super.onCreate/' "$MAIN"
          fi
          echo "→ Contenu MainActivity après modification :"
          cat "$MAIN"

      # ── Permissions Android ────────────────────────────────────
      - name: Add permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "BLUETOOTH_CONNECT" "$MANIFEST" || \
            sed -i 's/<uses-permission android:name="android.permission.INTERNET" \/>/\<uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" \/>/' "$MANIFEST"

      # ── Build ──────────────────────────────────────────────────
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── APK en téléchargement direct ───────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="LOTATO-PRO-v${{ github.run_number }}-${DATE}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LOTATO-PRO-v${{ github.run_number }}
          path: ${{ env.APK_NAME }}
          retention-days: 30
